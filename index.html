<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rental Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      body {
        background-color: #0f172a;
      }

      /* PDF Export Specific Styles */
      .export-mode {
        box-shadow: none !important;
        border: none !important;
        background: white !important;
      }

      .export-mode input[type="range"] {
        display: none !important;
      }

      .export-mode .html2pdf__page-break {
        display: block !important;
        break-before: page !important;
        page-break-before: always !important;
      }

      .export-mode input[type="text"],
      .export-mode select {
        border: none !important;
        background: transparent !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
        appearance: none !important;
        font-weight: 600 !important;
        color: #1e293b !important; /* slate-800 */
        pointer-events: none !important;
      }

      .export-mode .bg-slate-100,
      .export-mode .bg-slate-50,
      .export-mode .bg-white {
        background-color: transparent !important;
        box-shadow: none !important;
      }

      .export-mode .border-slate-300,
      .export-mode .border-slate-200 {
        border-color: #cbd5e1 !important; /* slate-300 */
      }

      .export-mode button,
      .export-mode label input[type="checkbox"] {
        display: none !important;
      }

      /* Keep owner occupied text but hide the checkbox */
      .export-mode label {
        pointer-events: none !important;
      }
      
      .export-mode .rounded-xl,
      .export-mode .rounded-2xl {
        border-radius: 0 !important;
      }

      .export-mode,
      .export-mode * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0"
  }
}
</script>
</head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
